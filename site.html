<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Книжная платформа | White Peakes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Шапка */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            background: none;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            color: #333;
        }

            .nav-btn:hover, .nav-btn.active {
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: white;
            }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
        }

        /* Основной контент */
        .main-content {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Карточки */
        .card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
        }

            .stat-card h3 {
                font-size: 0.9rem;
                opacity: 0.9;
                margin-bottom: 0.5rem;
            }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }

        /* Таблица книг */
        .books-table {
            width: 100%;
            border-collapse: collapse;
        }

            .books-table th, .books-table td {
                padding: 1rem;
                text-align: left;
                border-bottom: 1px solid #eee;
            }

            .books-table th {
                background: #f8f9fa;
                font-weight: 600;
            }

        .status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            display: inline-block;
        }

            .status.published {
                background: #d4edda;
                color: #155724;
            }

            .status.draft {
                background: #fff3cd;
                color: #856404;
            }

            .status.checking {
                background: #cce5ff;
                color: #004085;
            }

            .status.rejected {
                background: #f8d7da;
                color: #721c24;
            }

        /* Формы */
        .form-group {
            margin-bottom: 1rem;
        }

            .form-group label {
                display: block;
                margin-bottom: 0.5rem;
                font-weight: 500;
            }

            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                padding: 0.75rem;
                border: 2px solid #e0e0e0;
                border-radius: 10px;
                font-size: 1rem;
            }

                .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
                    outline: none;
                    border-color: #667eea;
                }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(102,126,234,0.4);
            }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .close-modal {
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2ecc71;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            display: none;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Загрузка */
        .loading {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">📚 White Peakes Book Platform</div>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showPage('profile')">Профиль</button>
            <button class="nav-btn" onclick="showPage('books')">Мои книги</button>
            <button class="nav-btn" onclick="showPage('library')">Библиотека</button>
            <button class="nav-btn" onclick="showPage('cart')">Корзина</button>
            <button class="nav-btn" onclick="showPage('recommendations')">Рекомендации</button>
        </div>
        <div class="user-info" id="user-info">
            <div class="user-avatar" id="user-avatar">👤</div>
            <span id="user-name">Гость</span>
            <button class="logout-btn" onclick="logout()" style="display: none;" id="logout-btn">Выйти</button>
            <button class="btn-primary" onclick="showAuthModal()" id="login-btn">Войти</button>
        </div>
    </div>

    <div class="main-content">
        <!-- Профиль -->
        <div id="profile-page">
            <div class="stats-grid" id="profile-stats">
                <div class="stat-card">
                    <h3>Уровень</h3>
                    <div class="stat-value" id="user-level">-</div>
                </div>
                <div class="stat-card">
                    <h3>Написано книг</h3>
                    <div class="stat-value" id="written-books">-</div>
                </div>
                <div class="stat-card">
                    <h3>Опубликовано</h3>
                    <div class="stat-value" id="published-books">-</div>
                </div>
                <div class="stat-card">
                    <h3>Прочитано книг</h3>
                    <div class="stat-value" id="read-books">-</div>
                </div>
            </div>

            <div class="card">
                <h3>📖 Прогресс чтения</h3>
                <div id="reading-progress"></div>
            </div>
        </div>

        <!-- Мои книги -->
        <div id="books-page" style="display: none;">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>📚 Мои книги</h2>
                    <button class="btn btn-primary" onclick="showCreateBookModal()">+ Новая книга</button>
                </div>
                <table class="books-table" id="my-books-table">
                    <thead>
                        <tr><th>Название</th><th>Статус</th><th>Цена</th><th>Рейтинг</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="my-books-list"></tbody>
                </table>
            </div>
        </div>

        <!-- Библиотека -->
        <div id="library-page" style="display: none;">
            <div class="card">
                <h2>📖 Библиотека книг</h2>
                <div style="margin: 1rem 0; display: flex; gap: 1rem;">
                    <input type="text" id="search-author" placeholder="Поиск по автору..." class="form-group" style="flex: 1;">
                    <select id="filter-status" class="form-group" style="width: auto;">
                        <option value="">Все статусы</option>
                        <option value="Опубликована">Опубликованные</option>
                        <option value="Черновик">Черновики</option>
                    </select>
                    <button class="btn btn-primary" onclick="loadLibrary()">Поиск</button>
                </div>
                <table class="books-table" id="library-table">
                    <thead><tr><th>Название</th><th>Автор</th><th>Цена</th><th>Рейтинг</th><th>Действия</th></tr></thead>
                    <tbody id="library-list"></tbody>
                </table>
            </div>
        </div>

        <!-- Корзина -->
        <div id="cart-page" style="display: none;">
            <div class="card">
                <h2>🛒 Корзина</h2>
                <div id="cart-content"></div>
            </div>
        </div>

        <!-- Рекомендации -->
        <div id="recommendations-page" style="display: none;">
            <div class="card">
                <h2>🎯 Рекомендации для вас</h2>
                <button class="btn btn-primary" onclick="generateRecommendations()" style="margin: 1rem 0;">Обновить рекомендации</button>
                <div id="recommendations-list"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Модальное окно авторизации -->
    <div id="auth-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Авторизация</h2>
                <span class="close-modal" onclick="closeAuthModal()">&times;</span>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <button class="btn" onclick="switchAuthMode('login')" id="login-tab">Вход</button>
                <button class="btn" onclick="switchAuthMode('register')" id="register-tab">Регистрация</button>
            </div>
            <div id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="example@mail.com">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="login-password">
                </div>
                <button class="btn btn-primary" onclick="login()">Войти</button>
            </div>
            <div id="register-form" style="display: none;">
                <div class="form-group">
                    <label>Никнейм</label>
                    <input type="text" id="reg-nickname">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="reg-password">
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="reg-role">
                        <option value="Читатель">Читатель</option>
                        <option value="Автор">Автор</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="register()">Зарегистрироваться</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно создания книги -->
    <div id="create-book-modal" class="modal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h2>Создать новую книгу</h2>
                <span class="close-modal" onclick="closeCreateBookModal()">&times;</span>
            </div>
            <div class="form-group">
                <label>Название</label>
                <input type="text" id="book-title">
            </div>
            <div class="form-group">
                <label>Цена</label>
                <input type="number" id="book-price" step="0.01">
            </div>
            <div class="form-group">
                <label>Количество страниц</label>
                <input type="number" id="book-pages">
            </div>
            <div class="form-group">
                <label>Содержание</label>
                <textarea id="book-content" rows="5"></textarea>
            </div>
            <button class="btn btn-primary" onclick="createBook()">Создать</button>
        </div>
    </div>

	    <script>
        const API_URL = 'http://localhost:5000/api';
        let token = localStorage.getItem('token');
        let currentUser = null;

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            if (token) {
                loadUserProfile();
            }
            loadLibrary();
        });

        // Показ страниц
        function showPage(page) {
            document.querySelectorAll('.main-content > div').forEach(div => div.style.display = 'none');
            document.getElementById(`${page}-page`).style.display = 'block';

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');

            if (page === 'profile') loadUserProfile();
            if (page === 'books') loadMyBooks();
            if (page === 'library') loadLibrary();
            if (page === 'cart') loadCart();
            if (page === 'recommendations') loadRecommendations();
        }

        // Авторизация
        function showAuthModal() {
            document.getElementById('auth-modal').style.display = 'flex';
        }

        function closeAuthModal() {
            document.getElementById('auth-modal').style.display = 'none';
        }

        function switchAuthMode(mode) {
            if (mode === 'login') {
                document.getElementById('login-form').style.display = 'block';
                document.getElementById('register-form').style.display = 'none';
            } else {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('register-form').style.display = 'block';
            }
        }

        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('token', token);
                    closeAuthModal();
                    loadUserProfile();
                    showToast('Login successful!');
                } else {
                    showToast(data.message || 'Login failed', 'error');
                }
            } catch (error) {
                showToast('Connection error', 'error');
            }
        }

        async function register() {
            const role = document.getElementById('reg-role').value;
            // Convert Russian role names to English
            const englishRole = role === 'Автор' ? 'Author' : (role === 'Редактор' ? 'Editor' : (role === 'Админ' ? 'Admin' : 'Reader'));
            
            const data = {
                nickname: document.getElementById('reg-nickname').value,
                fullName: document.getElementById('reg-nickname').value,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                role: englishRole
            };

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    showToast('Registration successful! Please login');
                    switchAuthMode('login');
                } else {
                    showToast(result.message || 'Registration failed', 'error');
                }
            } catch (error) {
                showToast('Connection error', 'error');
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            currentUser = null;
            document.getElementById('user-name').textContent = 'Guest';
            document.getElementById('login-btn').style.display = 'inline-block';
            document.getElementById('logout-btn').style.display = 'none';
            showToast('Logged out');
        }

        async function loadUserProfile() {
            if (!token) return;

            try {
                const res = await fetch(`${API_URL}/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('user-name').textContent = currentUser.nickname;
                    document.getElementById('user-avatar').textContent = currentUser.nickname[0].toUpperCase();
                    document.getElementById('login-btn').style.display = 'none';
                    document.getElementById('logout-btn').style.display = 'inline-block';

                    document.getElementById('user-level').textContent = currentUser.level || 1;
                    
                    // Author stats
                    const writtenBooks = (currentUser.inProgressBooksCount || 0) + (currentUser.publishedBooksCount || 0);
                    document.getElementById('written-books').textContent = writtenBooks;
                    document.getElementById('published-books').textContent = currentUser.publishedBooksCount || 0;
                    
                    // Reader stats
                    document.getElementById('read-books').textContent = currentUser.readBooksCount || 0;

                    loadReadingProgress();
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        async function loadReadingProgress() {
            if (!token) return;
            try {
                const res = await fetch(`${API_URL}/books/progress`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const progress = await res.json();
                    const container = document.getElementById('reading-progress');
                    if (progress.length === 0) {
                        container.innerHTML = '<p>You haven\'t started reading any books yet</p>';
                    } else {
                        container.innerHTML = progress.map(p => `
                            <div style="margin-bottom: 0.5rem;">
                                <strong>${p.bookTitle}</strong> - Page ${p.lastPage}${p.isCompleted ? ' ✅ Completed' : ''}
                            </div>
                        `).join('');
                    }
                }
            } catch (error) {
                console.error('Error loading progress:', error);
            }
        }

        async function loadMyBooks() {
            if (!token || !currentUser) return;
            try {
                const res = await fetch(`${API_URL}/books?author=${currentUser.nickname}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const books = await res.json();
                const tbody = document.getElementById('my-books-list');
                if (books.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No books found. Create your first book!</td></tr>';
                } else {
                    tbody.innerHTML = books.map(book => `
                        <tr>
                            <td>${book.title}</td>
                            <td><span class="status ${getStatusClass(book.status)}">${translateStatus(book.status)}</span></td>
                            <td>${book.price} ₽</td>
                            <td>${book.rating || '—'}</td>
                            <td>
                                <button class="btn btn-danger" onclick="deleteBook(${book.id})">Delete</button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading books:', error);
            }
        }

        async function loadLibrary() {
            const author = document.getElementById('search-author')?.value || '';
            let url = `${API_URL}/books`;
            if (author) {
                url += `?author=${encodeURIComponent(author)}`;
            }

            try {
                const res = await fetch(url);
                const books = await res.json();
                const tbody = document.getElementById('library-list');
                if (books.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5">No books found</td></tr>';
                } else {
                    tbody.innerHTML = books.map(book => `
                        <tr>
                            <td>${book.title}</td>
                            <td>${book.authorName}</td>
                            <td>${book.price} ₽</td>
                            <td>${book.rating || '—'}</td>
                            <td>
                                <button class="btn btn-primary" onclick="addToCart(${book.id})">Add to Cart</button>
                                ${token ? `<button class="btn" onclick="updateProgress(${book.id})">Read</button>` : ''}
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading library:', error);
            }
        }

        async function loadCart() {
            if (!token) {
                document.getElementById('cart-content').innerHTML = '<p>Login to see your cart</p>';
                return;
            }
            try {
                const res = await fetch(`${API_URL}/orders/cart`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const cart = await res.json();
                if (!cart || !cart.items || cart.items.length === 0) {
                    document.getElementById('cart-content').innerHTML = '<p>Cart is empty</p>';
                } else {
                    document.getElementById('cart-content').innerHTML = `
                        <table class="books-table">
                            <thead><tr><th>Book</th><th>Price</th><th></th></tr></thead>
                            <tbody>
                                ${cart.items.map(item => `
                                    <tr>
                                        <td>${item.bookTitle}</td>
                                        <td>${item.priceAtPurchase} ₽</td>
                                        <td><button class="btn btn-danger" onclick="removeFromCart(${item.id})">Remove</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <div style="margin-top: 1rem; text-align: right;">
                            <strong>Total: ${cart.totalAmount} ₽</strong>
                            <button class="btn btn-success" onclick="checkout()" style="margin-left: 1rem;">Checkout</button>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }

        async function loadRecommendations() {
            if (!token) {
                document.getElementById('recommendations-list').innerHTML = '<p>Login to see recommendations</p>';
                return;
            }
            try {
                const res = await fetch(`${API_URL}/recommendations`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const recs = await res.json();
                if (recs.length === 0) {
                    document.getElementById('recommendations-list').innerHTML = '<p>No recommendations. Click "Generate" to get personalized suggestions</p>';
                } else {
                    document.getElementById('recommendations-list').innerHTML = `
                        <div class="stats-grid">
                            ${recs.map(rec => `
                                <div class="stat-card">
                                    <h3>${rec.bookTitle}</h3>
                                    <div>${rec.authorName}</div>
                                    <div>⭐ ${rec.rating || '—'}</div>
                                    <div>${rec.price} ₽</div>
                                    <button class="btn btn-primary" style="margin-top: 1rem;" onclick="addToCart(${rec.bookId})">Add to Cart</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading recommendations:', error);
            }
        }

        async function generateRecommendations() {
            if (!token) return;
            try {
                const res = await fetch(`${API_URL}/recommendations/generate`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('Recommendations updated!');
                    loadRecommendations();
                }
            } catch (error) {
                console.error('Error generating recommendations:', error);
            }
        }

        async function createBook() {
            if (!token) return;
            const book = {
                title: document.getElementById('book-title').value,
                price: parseFloat(document.getElementById('book-price').value),
                pageCount: parseInt(document.getElementById('book-pages').value),
                content: document.getElementById('book-content').value,
                dateWritten: new Date().toISOString()
            };

            if (!book.title || !book.price || !book.pageCount) {
                showToast('Please fill all fields', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/books`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(book)
                });
                if (res.ok) {
                    showToast('Book created!');
                    closeCreateBookModal();
                    loadMyBooks();
                    document.getElementById('book-title').value = '';
                    document.getElementById('book-price').value = '';
                    document.getElementById('book-pages').value = '';
                    document.getElementById('book-content').value = '';
                } else {
                    const error = await res.json();
                    showToast(error.message || 'Error creating book', 'error');
                }
            } catch (error) {
                showToast('Connection error', 'error');
            }
        }

        async function addToCart(bookId) {
            if (!token) {
                showAuthModal();
                return;
            }
            try {
                const res = await fetch(`${API_URL}/orders/cart/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ bookId })
                });
                if (res.ok) {
                    showToast('Book added to cart');
                    loadCart();
                } else {
                    const error = await res.json();
                    showToast(error.message || 'Error', 'error');
                }
            } catch (error) {
                showToast('Connection error', 'error');
            }
        }

        async function removeFromCart(orderItemId) {
            if (!token) return;
            try {
                const res = await fetch(`${API_URL}/orders/cart/remove/${orderItemId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('Book removed from cart');
                    loadCart();
                }
            } catch (error) {
                showToast('Error', 'error');
            }
        }

        async function checkout() {
            if (!token) return;
            try {
                const res = await fetch(`${API_URL}/orders/checkout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ orderItemIds: [] })
                });
                if (res.ok) {
                    showToast('Order placed successfully!');
                    loadCart();
                }
            } catch (error) {
                showToast('Error', 'error');
            }
        }

        async function deleteBook(bookId) {
            if (!confirm('Delete this book?')) return;
            try {
                const res = await fetch(`${API_URL}/books/${bookId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    showToast('Book deleted');
                    loadMyBooks();
                }
            } catch (error) {
                showToast('Error', 'error');
            }
        }

        function updateProgress(bookId) {
            const page = prompt('What page are you on?', '1');
            if (page && token) {
                fetch(`${API_URL}/books/${bookId}/progress`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ lastPage: parseInt(page), isCompleted: false })
                }).then(() => {
                    showToast('Progress saved');
                    loadReadingProgress();
                });
            }
        }

        function getStatusClass(status) {
            const map = { 
                'Published': 'published', 
                'Draft': 'draft', 
                'UnderReview': 'checking', 
                'Rejected': 'rejected',
                'Опубликована': 'published',
                'Черновик': 'draft',
                'НаПроверке': 'checking',
                'Отклонена': 'rejected'
            };
            return map[status] || 'draft';
        }

        function translateStatus(status) {
            const map = {
                'Published': 'Опубликована',
                'Draft': 'Черновик',
                'UnderReview': 'На проверке',
                'Rejected': 'Отклонена'
            };
            return map[status] || status;
        }

        function showCreateBookModal() {
            if (!token) { showAuthModal(); return; }
            document.getElementById('create-book-modal').style.display = 'flex';
        }

        function closeCreateBookModal() {
            document.getElementById('create-book-modal').style.display = 'none';
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.backgroundColor = type === 'error' ? '#e74c3c' : '#2ecc71';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
   </body>
</html>
